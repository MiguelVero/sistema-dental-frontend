server {
    listen 4200;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # En lugar de proxy_pass interno, redirigir al backend público
    location /api {
        # Usar la variable de entorno con la URL del backend
        set $backend_url "https://sistema-dental-backend-production.up.railway.app";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Reescribir la URL
        rewrite ^/api/(.*) /api/$1 break;
    }
}