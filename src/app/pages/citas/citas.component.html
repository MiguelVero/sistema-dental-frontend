<div class="container mx-auto p-4">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">📋 Gestión de Citas</h1>
    <div class="space-x-2">
      <button (click)="enviarRecordatoriosMasivos()" 
              class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
        📱 Enviar recordatorios masivos
      </button>
      <button routerLink="/citas/nueva" 
              class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
        + Nueva cita
      </button>
    </div>
  </div>

  <!-- Tabs de filtros -->
  <div class="flex space-x-2 mb-4 border-b">
    <button (click)="filtro = 'todas'" 
            [class.bg-blue-500]="filtro === 'todas'"
            class="px-4 py-2 rounded-t-lg transition">
      Todas
    </button>
    <button (click)="filtro = 'hoy'" 
            [class.bg-blue-500]="filtro === 'hoy'"
            class="px-4 py-2 rounded-t-lg transition">
      📅 Hoy
    </button>
    <button (click)="filtro = 'pendientes'" 
            [class.bg-blue-500]="filtro === 'pendientes'"
            class="px-4 py-2 rounded-t-lg transition">
      ⏳ Pendientes
    </button>
  </div>

  <!-- Tabla de citas -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-4 py-2">Paciente</th>
          <th class="px-4 py-2">Tratamiento</th>
          <th class="px-4 py-2">Fecha</th>
          <th class="px-4 py-2">Hora</th>
          <th class="px-4 py-2">Estado</th>
          <th class="px-4 py-2">Recordatorios</th>
          <th class="px-4 py-2">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cita of citasFiltradas" class="border-t hover:bg-gray-50">
          <td class="px-4 py-2">
            {{ cita.paciente?.nombre }}
            <div class="text-xs text-gray-500">{{ cita.paciente?.telefono }}</div>
          </td>
          <td class="px-4 py-2">{{ cita.tratamiento?.nombre }}</td>
          <td class="px-4 py-2">{{ cita.fecha | date:'dd/MM/yyyy' }}</td>
          <td class="px-4 py-2">{{ cita.hora | slice:0:5 }}</td>
          <td class="px-4 py-2">
            <span [class]="getEstadoClass(cita.estado)" class="px-2 py-1 rounded-full text-xs">
              {{ getEstadoText(cita.estado) }}
            </span>
          </td>
          <td class="px-4 py-2 text-xs">
            <div *ngIf="cita.recordatorio_24h_enviado" class="text-green-600">✅ 24h</div>
            <div *ngIf="cita.recordatorio_1h_enviado" class="text-blue-600">⏰ 1h</div>
            <div *ngIf="!cita.recordatorio_24h_enviado && !cita.recordatorio_1h_enviado" class="text-gray-400">-</div>
          </td>
          <td class="px-4 py-2 space-x-1">
            <button (click)="enviarRecordatorio(cita)" 
                    class="text-green-600 hover:text-green-800" 
                    title="Enviar recordatorio">
              📱
            </button>
            <button (click)="cambiarEstado(cita, 'confirmada')" 
                    *ngIf="cita.estado === 'pendiente'"
                    class="text-blue-600 hover:text-blue-800" 
                    title="Confirmar">
              ✅
            </button>
            <button (click)="cambiarEstado(cita, 'cancelada')" 
                    *ngIf="cita.estado === 'pendiente'"
                    class="text-red-600 hover:text-red-800" 
                    title="Cancelar">
              ❌
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
