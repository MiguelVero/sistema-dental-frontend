<div class="container">
  <h1>📅 Nueva Cita</h1>
  
  <form (ngSubmit)="guardarCita()">
    <div class="form-group">
      <label>Paciente:</label>
      <select [(ngModel)]="cita.paciente_id" name="paciente_id" required>
        <option value="">Seleccionar paciente</option>
        <option *ngFor="let p of pacientes" [value]="p.id">{{p.nombre}}</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Tratamiento:</label>
      <select [(ngModel)]="cita.tratamiento_id" name="tratamiento_id" required>
        <option value="">Seleccionar tratamiento</option>
        <option *ngFor="let t of tratamientos" [value]="t.id">{{t.nombre}}</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Fecha:</label>
      <input type="date" [(ngModel)]="cita.fecha" name="fecha" required>
    </div>
    
    <div class="form-group">
      <label>Hora:</label>
      <input type="time" [(ngModel)]="cita.hora" name="hora" required>
    </div>
    
    <button type="submit" class="btn-primary">Guardar Cita</button>
    <button type="button" routerLink="/citas" class="btn-secondary">Cancelar</button>
  </form>
</div>
